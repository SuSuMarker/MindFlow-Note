version: "3.9"

services:
  mindflow-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      MINDFLOW_BIND: 0.0.0.0:8787
      MINDFLOW_DB_URL: sqlite:///data/mindflow.db
      MINDFLOW_DATA_DIR: /data
      MINDFLOW_JWT_SECRET: ${MINDFLOW_JWT_SECRET:?set in .env}
    volumes:
      - mindflow-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8787/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2
    depends_on:
      mindflow-server:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      MINDFLOW_DOMAIN: ${MINDFLOW_DOMAIN:?set in .env}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  mindflow-data:
  caddy_data:
  caddy_config:
