version: "3.9"

services:
  mindflow-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      MINDFLOW_BIND: 0.0.0.0:8787
      MINDFLOW_DB_URL: sqlite:///data/mindflow.db
      MINDFLOW_DATA_DIR: /data
      MINDFLOW_JWT_SECRET: ${MINDFLOW_JWT_SECRET:?set in .env}
    volumes:
      - mindflow-data:/data
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"

volumes:
  mindflow-data:
